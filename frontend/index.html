<!DOCTYPE html>
<html>

<head>
    <title>Inventory Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Add Product</h1>

    <input
        type="text"
        id="name"
        placeholder="Product Name">

    <br><br>

    <input
    type="number"
    id="quantity"
    min="1"
    placeholder="Quantity">

    <br><br>

    <button onclick="addProduct()">
        Add Product
    </button>
    
    <p id="productMessage"></p>

    <button onclick="loadProducts()">
        Load Products
    </button>

    <button onclick="loadSales()">
    Load Sales
    </button>

    <br><br>

    <h2>Record Sale</h2>

   <input
    type="number"
    id="productId"
    min="1"
    placeholder="Product ID">

    <br><br>

    <input
    type="number"
    id="quantitySold"
    min="1"
    placeholder="Quantity Sold">

    <br><br>

    <button onclick="recordSale()">
        Record Sale
    </button>

    <p id="saleMessage"></p>

    <br><br>

    <h2>Inventory</h2>

    <table id="productTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product</th>
                <th>Quantity</th>
            </tr>
        </thead>

        <tbody id="productTableBody">
        </tbody>
    </table>

    <h2>Sales History</h2>

<table id="salesTable">

    <thead>
        <tr>
            <th>Sale ID</th>
            <th>Product</th>
            <th>Quantity Sold</th>
        </tr>
    </thead>

    <tbody id="salesTableBody">
    </tbody>

</table>

    <script src="script.js"></script>

</body>

</html>
