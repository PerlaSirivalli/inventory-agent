<!DOCTYPE html>
<html>

<head>
    <title>Inventory Agent</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
    <h1>Inventory Management Dashboard</h1>
</div>
    <div id="statsContainer">

  <div class="stat-card products">
    <h3>Total Products</h3>
    <p id="totalProducts">0</p>
</div>

<div class="stat-card stock">
    <h3>Total Stock</h3>
    <p id="totalStock">0</p>
</div>

<div class="stat-card sales">
    <h3>Total Sales</h3>
    <p id="totalSales">0</p>
</div>
</div>
<div class="card">

    <h2>⚠ Low Stock Alerts</h2>

    <div id="lowStockContainer">
        No low stock products
    </div>

</div>
<div class="top-cards">
    <div class="card">

        <h1>Add Product</h1>

        <input
            type="text"
            id="name"
            placeholder="Product Name">

        <br>

        <input
            type="number"
            id="quantity"
            min="1"
            placeholder="Quantity">

        <br>

        <button onclick="addProduct()">
            Add Product
        </button>

        <p id="productMessage"></p>

    </div>

    <div class="card">

        <h2>Record Sale</h2>

        <input
            type="number"
            id="productId"
            min="1"
            placeholder="Product ID">

        <br>

        <input
            type="number"
            id="quantitySold"
            min="1"
            placeholder="Quantity Sold">

        <br>

        <button onclick="recordSale()">
            Record Sale
        </button>

        <p id="saleMessage"></p>

    </div>
</div>
    <div class="card">

        <h2>Search Product</h2>

        <div class="management-row">

    <input
        type="text"
        id="searchName"
        placeholder="Enter product name">

    <button onclick="searchProduct()">
        Search
    </button>

</div>

        <p id="searchMessage"></p>

        <hr>

        <h2>Update Product</h2>

        <div class="management-row">

    <select id="updateProductId"></select>

    <input
        type="number"
        id="updateProductQuantity"
        min="1"
        placeholder="New Quantity">

    <button onclick="updateProduct()">
        Update Product
    </button>

</div>
        <p id="updateMessage"></p>

        <hr>

        <h2>Delete Product</h2>

        <div class="management-row">

    <select id="deleteProductId"></select>

   <button class="delete-btn" onclick="deleteProduct()">
    Delete Product
</button>

</div>

        <p id="deleteMessage"></p>

    </div>

    <div class="card">

        <h2>Inventory</h2>

        <table id="productTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Product</th>
                    <th>Quantity</th>
                </tr>
            </thead>

            <tbody id="productTableBody">
            </tbody>

        </table>

    </div>

    <div class="card">

        <h2>Sales History</h2>

        <table id="salesTable">

            <thead>
                <tr>
                    <th>Sale ID</th>
                    <th>Product</th>
                    <th>Quantity Sold</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody id="salesTableBody">
            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
